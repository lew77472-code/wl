<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影作品集 | My Photography Portfolio</title>
    <style>
        /* --- 1. 全局与导航 --- */
        html { scroll-behavior: smooth; }
        body { 
            background-color: #0f0f0f; 
            color: #ffffff; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; line-height: 1.6; 
        }
        .navbar { 
            position: fixed; top: 0; width: 100%; 
            background-color: rgba(15, 15, 15, 0.9); 
            backdrop-filter: blur(10px); z-index: 1000; 
            border-bottom: 1px solid #222; 
        }
        .nav-container { 
            max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; 
            align-items: center; padding: 15px 20px; 
        }
        .logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #888; font-size: 0.9rem; transition: color 0.3s; }
        .nav-links a:hover { color: #fff; }

        /* --- 2. 头部区域 --- */
        header { text-align: center; padding: 150px 20px 80px; }
        .title { font-size: 3rem; font-weight: 200; letter-spacing: 8px; margin: 0; text-transform: uppercase; }
        .subtitle { color: #666; margin-top: 20px; letter-spacing: 3px; font-size: 0.9rem; }

        /* --- 3. 画廊与精致小字 --- */
        .gallery-section { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .gallery-container { column-count: 3; column-gap: 25px; }
        
        .photo-card { 
            break-inside: avoid; margin-bottom: 30px; 
            background-color: #0f0f0f; 
            transition: transform 0.3s ease; 
        }
        .photo-card img { 
            width: 100%; height: auto; display: block; 
            border-radius: 4px; filter: grayscale(10%); 
            transition: filter 0.3s; cursor: zoom-in;
        }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card:hover img { filter: grayscale(0%); }

        /* 文字说明样式 */
        .photo-info { padding: 15px 0 10px 0; }
        .photo-title { 
            display: block; font-size: 0.9rem; 
            color: #eee; letter-spacing: 1px; margin-bottom: 4px; 
        }
        .photo-meta { 
            display: block; font-size: 0.7rem; 
            color: #555; letter-spacing: 1px; text-transform: uppercase; 
        }

        /* --- 4. 增强版预览层 --- */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center;
            flex-direction: column;
        }
        #lightbox-img { max-width: 90%; max-height: 80%; border-radius: 4px; object-fit: contain; }
        #lightbox-caption { margin-top: 20px; text-align: center; letter-spacing: 2px; }

        /* 切换按钮 */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: none; color: white; border: none;
            padding: 30px 20px; cursor: pointer; font-size: 2.5rem; opacity: 0.3; transition: 0.3s;
        }
        .nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; background: none; border: none; color: #888; cursor: pointer; }

        /* --- 5. 底部与适配 --- */
        .contact-section { background-color: #161616; padding: 100px 20px; text-align: center; }
        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
        @media (max-width: 768px) { 
            .gallery-container { column-count: 1; } 
            .title { font-size: 2rem; } 
            .nav-btn { display: none; } /* 手机端隐藏切换按钮，主要靠点选 */
        }
    </style>
</head>
<body id="home">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MY VISION</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#gallery">作品</a></li>
                <li><a href="#contact">联系方式</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <h1 class="title">Visual Journal</h1>
        <p class="subtitle">记录光影中的每一个瞬间</p>
    </header>

    <section class="gallery-section" id="gallery">
        <div class="gallery-container">
            
            <div class="photo-card">
                <img src="images/1.jpg" alt="Work 1">
                <div class="photo-info">
                    <span class="photo-title">冰岛 · 维克黑沙滩</span>
                    <span class="photo-meta">Sony A7M4 | 24-70mm f/2.8 GM</span>
                </div>
            </div>

            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=800&q=80" alt="Work 2">
                <div class="photo-info">
                    <span class="photo-title">深山迷雾</span>
                    <span class="photo-meta">Fujifilm X-T4 | 35mm f/1.4</span>
                </div>
            </div>

            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=800&q=80" alt="Work 3">
                <div class="photo-info">
                    <span class="photo-title">光影人像</span>
                    <span class="photo-meta">Canon R5 | 85mm f/1.2L</span>
                </div>
            </div>

            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800&q=80" alt="Work 4">
                <div class="photo-info">
                    <span class="photo-title">落日山脉</span>
                    <span class="photo-meta">Sony A7R3 | 16-35mm f/2.8</span>
                </div>
            </div>

        </div>
    </section>

    <section class="contact-section" id="contact">
        <h2>GET IN TOUCH</h2>
        <p style="color: #888;">Email: contact@yourdomain.com</p>
    </section>

    <footer>&copy; 2024 Your Name Photography. 保持热爱，奔赴山海。</footer>

    <div id="lightbox">
        <button class="close-btn">✕ 关闭</button>
        <button class="nav-btn prev-btn">❮</button>
        <img id="lightbox-img" src="">
        <div id="lightbox-caption"></div>
        <button class="nav-btn next-btn">❯</button>
    </div>

    <script>
        const cards = document.querySelectorAll('.photo-card img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        let currentIndex = 0;

        // 更新预览层内容
        function updateLightbox(index) {
            currentIndex = index;
            const img = cards[currentIndex];
            const info = img.parentElement.querySelector('.photo-info');
            
            // 同步图片
            lightboxImg.src = img.src;
            
            // 同步文字说明
            const title = info.querySelector('.photo-title').innerText;
            const meta = info.querySelector('.photo-meta').innerText;
            lightboxCaption.innerHTML = `
                <div style="color:white; font-size:1rem; margin-bottom:5px;">${title}</div>
                <div style="color:#666; font-size:0.75rem;">${meta}</div>
            `;
        }

        // 打开预览
        cards.forEach((img, index) => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                updateLightbox(index);
                lightbox.style.display = 'flex';
            });
        });

        // 切换逻辑
        function showNext() {
            currentIndex = (currentIndex + 1) % cards.length;
            updateLightbox(currentIndex);
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateLightbox(currentIndex);
        }

        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });

        // 关闭逻辑
        lightbox.addEventListener('click', () => { lightbox.style.display = 'none'; });
        document.querySelector('.close-btn').addEventListener('click', () => { lightbox.style.display = 'none'; });

        // 键盘监听
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') showNext();
                if (e.key === 'ArrowLeft') showPrev();
                if (e.key === 'Escape') lightbox.style.display = 'none';
            }
        });
    </script>
</body>
</html>
