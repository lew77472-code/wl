<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION ARCHIVE | Photography Portfolio</title>
    <style>
        :root {
            --dark-bg: #080808;
            --light-bg: #ffffff;
            --transition-speed: 0.6s;
            --desktop-max-width: 1400px; 
            --desktop-padding: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; 
            overflow-x: hidden; 
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            transition: background-color var(--transition-speed);
        }
        body.light-mode { background-color: var(--light-bg); color: #000; }

        /* --- 导航栏 --- */
        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
            background: rgba(8,8,8,0.7); backdrop-filter: blur(15px); transition: 0.4s; 
        }
        body.light-mode .navbar { background: rgba(255,255,255,0.8); border-bottom: 1px solid #f0f0f0; }

        .nav-container { 
            display: flex; justify-content: space-between; align-items: center; 
            margin: 0 auto; max-width: var(--desktop-max-width); padding: 20px var(--desktop-padding);
        }
        
        .logo { display: flex; gap: 4px; cursor: pointer; mix-blend-mode: difference; }
        .logo span { width: 6px; height: 6px; background: #fff; border-radius: 50%; }

        .nav-links { list-style: none; display: flex; gap: 45px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #888; display: flex; flex-direction: column; align-items: center; transition: 0.3s; font-size: 0.85rem; letter-spacing: 2px;}
        .nav-links a:hover span { color: #fff; }
        body.light-mode .nav-links a:hover span { color: #000; }

        /* --- 响应式布局容器 --- */
        #main-wrapper { margin: 0 auto; width: 100%; }
        .view-section { display: none; opacity: 0; width: 100%; padding-top: 140px; }
        .active-view { display: block; opacity: 1; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; padding: 60px 20px 100px; }
        header h1 { font-size: 3.5rem; letter-spacing: 20px; text-transform: uppercase; margin: 0; }
        header p { font-size: 0.9rem; color: #666; letter-spacing: 6px; margin-top: 30px; }

        /* --- 首页图片网格 --- */
        .collections-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 80px 60px; 
            max-width: var(--desktop-max-width); 
            margin: 0 auto; 
            padding: 0 var(--desktop-padding) 120px; 
        }

        .collection-card { cursor: pointer; width: 100%; }
        .img-wrap { aspect-ratio: 3/4; overflow: hidden; background: #111; margin-bottom: 20px; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.2, 0, 0.2, 1); filter: brightness(0.85); }
        .collection-card:hover img { transform: scale(1.05); filter: brightness(1); }
        .card-zh { font-size: 1.1rem; margin-bottom: 6px; }
        .card-en { font-size: 0.75rem; color: #666; letter-spacing: 1px; text-transform: uppercase; }

        /* --- 详情页标签样式 (重要补回) --- */
        .detail-wrapper { max-width: 1000px; margin: 0 auto; padding: 0 var(--desktop-padding) 120px; color: #000; }
        .meta-bar { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; 
            padding: 25px 0; margin: 40px 0; 
        }
        .meta-item { display: flex; flex-direction: column; gap: 8px; }
        .meta-label { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .meta-value { font-size: 0.9rem; color: #333; font-weight: 500; }

        .detail-gallery { display: flex; flex-direction: column; gap: 60px; margin-top: 60px; }
        .detail-gallery img { width: 100%; height: auto; }

        /* --- 页脚与浏览量 --- */
        .footer-contact { 
            padding: 100px var(--desktop-padding); 
            border-top: 1px solid rgba(128,128,128,0.1);
            max-width: var(--desktop-max-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-left { display: flex; gap: 40px; }
        .footer-left a { text-decoration: none; color: #666; font-size: 0.75rem; transition: 0.3s; }
        .footer-left a:hover { color: #fff; }
        body.light-mode .footer-left a:hover { color: #000; }
        
        .page-views { font-family: monospace; font-size: 0.75rem; color: #444; letter-spacing: 1px; }

        /* --- 移动端适配 --- */
        @media (max-width: 768px) {
            .nav-container { padding: 15px 20px; }
            .nav-links { gap: 20px; }
            .nav-links a span { font-size: 0.75rem; }
            header h1 { font-size: 1.8rem; letter-spacing: 6px; }
            .collections-grid { grid-template-columns: 1fr; padding: 0 20px 80px; gap: 40px; }
            .meta-bar { grid-template-columns: 1fr 1fr; gap: 30px; }
            .footer-contact { flex-direction: column; gap: 30px; text-align: center; }
            .footer-left { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body id="page-body">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.hash=''"><span></span><span></span><span></span></div>
            <ul class="nav-links">
                <li><a href="#"><span>首页</span></a></li>
                <li><a href="#main-grid"><span>合集</span></a></li>
                <li><a href="#about"><span>关于</span></a></li>
                <li><a href="#contact-anchor"><span>联系</span></a></li>
            </ul>
        </div>
    </nav>

    <div id="main-wrapper">
        <main id="landing-page" class="view-section active-view">
            <header>
                <h1>Vision Archive</h1>
                <p>以此存档 那些被日光稀释的瞬间</p>
            </header>
            <div class="collections-grid" id="main-grid"></div>
        </main>

        <main id="about-page" class="view-section">
            <div class="detail-wrapper">
                <div style="padding: 20px 0;"><a onclick="window.location.hash=''" style="cursor:pointer; font-size:0.75rem; color:#888;">← BACK TO HOME</a></div>
                <h1 style="font-size: 2.5rem; margin: 20px 0;">关于 VISION ARCHIVE</h1>
                <p style="color: #666; line-height: 2;">这里是你的个人摄影存档空间。专注于通过镜头捕捉光影与空间的细微关系，重新建立观察者对数字影像的真实感知。</p>
            </div>
        </main>

        <main id="detail-page" class="view-section">
            <div class="detail-wrapper">
                <div style="padding: 20px 0;"><a onclick="window.location.hash=''" style="cursor:pointer; font-size:0.75rem; color:#888;">← BACK TO PROJECTS</a></div>
                <h1 id="det-zh" style="font-size: 2.8rem; margin: 10px 0;">项目名称</h1>
                
                <div class="meta-bar">
                    <div class="meta-item"><span class="meta-label">类别 / CATEGORY</span><span id="det-cat" class="meta-value">-</span></div>
                    <div class="meta-item"><span class="meta-label">地点 / LOCATION</span><span id="det-loc" class="meta-value">-</span></div>
                    <div class="meta-item"><span class="meta-label">年份 / YEAR</span><span id="det-year" class="meta-value">-</span></div>
                    <div class="meta-item"><span class="meta-label">角色 / ROLE</span><span id="det-role" class="meta-value">-</span></div>
                </div>

                <div id="det-intro" style="margin: 40px auto; line-height: 2; color: #444; font-size: 1.05rem;"></div>
                <div class="detail-gallery" id="det-images"></div>
            </div>
        </main>

        <footer class="footer-contact" id="contact-anchor">
            <div class="footer-left">
                <a href="#">@Vision Archive</a>
                <a href="mailto:contact@visionarchive.me">Email</a>
                <a href="https://xhslink.com/m/52WU1ywxBjw" target="_blank">Xiaohongshu ↗</a>
            </div>
            <div class="page-views" id="view-counter">VIEWS: 000,000</div>
        </footer>
    </div>

    <script>
        // 数据增加 Role 字段
        const collections = [
            { zh: "荒野之境", en: "Silence of Wild", cat: "Nature", loc: "Turkey", yr: "2023", role: "Photographer", intro: "探索自然界中被遗忘的寂静角落。", images: ["1.jpg", "2.jpg"] },
            { zh: "瞬时街头", en: "Pulse of Street", cat: "Street", loc: "Tokyo", yr: "2024", role: "Digital Archive", intro: "捕捉城市脉动中的瞬时美学。", images: ["4.jpg", "5.jpg"] },
            { zh: "几何重塑", en: "Geometry Forms", cat: "Architecture", loc: "Berlin", yr: "2024", role: "Lead Artist", intro: "建筑与光影的几何解构。", images: ["9.jpg", "10.jpg"] },
            { zh: "呼吸之间", en: "Breath of Life", cat: "Conceptual", loc: "Iceland", yr: "2022", role: "Visual Research", intro: "记录生命最原始的律动。", images: ["6.jpg", "7.jpg"] }
        ];

        // 模拟浏览量增加
        function updateViews() {
            let views = parseInt(localStorage.getItem('page_views') || "12840");
            views += Math.floor(Math.random() * 5) + 1;
            localStorage.setItem('page_views', views);
            document.getElementById('view-counter').innerText = `VIEWS: ${views.toLocaleString()}`;
        }

        function handleRoute() {
            const hash = window.location.hash;
            const landing = document.getElementById('landing-page');
            const about = document.getElementById('about-page');
            const detail = document.getElementById('detail-page');

            [landing, about, detail].forEach(el => el.classList.remove('active-view'));

            if (hash === '#about') {
                about.classList.add('active-view');
                document.body.classList.add('light-mode');
            } else if (hash.startsWith('#project-')) {
                const idx = parseInt(hash.replace('#project-', ''));
                renderDetail(idx);
                detail.classList.add('active-view');
                document.body.classList.add('light-mode');
            } else {
                landing.classList.add('active-view');
                document.body.classList.remove('light-mode');
            }
            window.scrollTo(0, 0);
        }

        function renderDetail(idx) {
            const data = collections[idx];
            document.getElementById('det-zh').innerText = data.zh;
            document.getElementById('det-cat').innerText = data.cat;
            document.getElementById('det-loc').innerText = data.loc;
            document.getElementById('det-year').innerText = data.yr;
            document.getElementById('det-role').innerText = data.role;
            document.getElementById('det-intro').innerText = data.intro;
            
            const gallery = document.getElementById('det-images');
            gallery.innerHTML = '';
            data.images.forEach(imgName => {
                const img = document.createElement('img');
                img.src = `images/${imgName}`;
                gallery.appendChild(img);
            });
        }

        const grid = document.getElementById('main-grid');
        collections.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'collection-card';
            card.onclick = () => window.location.hash = `project-${index}`;
            card.innerHTML = `
                <div class="img-wrap"><img src="images/${item.images[0]}" loading="lazy"></div>
                <div class="card-zh">${item.zh}</div>
                <div class="card-en">${item.en}</div>
            `;
            grid.appendChild(card);
        });

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', () => {
            handleRoute();
            updateViews();
        });
    </script>
</body>
</html>
