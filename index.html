<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION ARCHIVE | Photography Portfolio</title>
    <style>
        :root {
            --dark-bg: #080808;
            --light-bg: #ffffff;
            --transition-speed: 0.6s;
            --content-max-width: 1200px; 
            --content-padding: 40px;      
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; 
            overflow-x: hidden; 
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            transition: background-color var(--transition-speed);
        }
        body.light-mode { background-color: var(--light-bg); color: #000; }

        /* --- 导航栏 --- */
        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
            background: rgba(8,8,8,0.7); backdrop-filter: blur(15px); transition: 0.4s; 
        }
        .mode-mobile-active .navbar { max-width: 420px; left: 50%; transform: translateX(-50%); }
        body.light-mode .navbar { background: rgba(255,255,255,0.8); border-bottom: 1px solid #f0f0f0; }

        .nav-container { max-width: var(--content-max-width); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px var(--content-padding); }
        .logo { display: flex; gap: 4px; cursor: pointer; mix-blend-mode: difference; }
        .logo span { width: 5px; height: 5px; background: #fff; border-radius: 50%; }

        .nav-links { list-style: none; display: flex; gap: 35px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a small { opacity: 0; transform: translateY(4px); transition: 0.3s; font-size: 0.55rem; color: #999; text-transform: uppercase; margin-top: 4px;}
        .nav-links a:hover span { color: #fff; }
        body.light-mode .nav-links a:hover span { color: #000; }
        .nav-links a:hover small { opacity: 1; transform: translateY(0); }

        /* --- 框架逻辑 --- */
        #main-wrapper { 
            margin: 0 auto; 
            min-height: 100vh; 
            width: 100%; 
            max-width: 100%;
            transition: max-width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .mode-mobile-active#main-wrapper { 
            max-width: 420px !important; 
            border-left: 1px solid rgba(128,128,128,0.2); 
            border-right: 1px solid rgba(128,128,128,0.2); 
        }
        
        #device-toggle {
            position: fixed; bottom: 40px; right: 40px; z-index: 3000;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.5s; opacity: 0.5;
        }
        #device-toggle:hover { opacity: 1; transform: scale(1.1); }
        #device-toggle svg { width: 22px; height: 22px; fill: #888; }

        .view-section { padding-top: 140px; display: none; opacity: 0; width: 100%; }
        .active-view { display: block; opacity: 1; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 首页网格 --- */
        header { text-align: center; padding: 40px 20px 100px; }
        header h1 { font-size: 3rem; letter-spacing: 20px; text-transform: uppercase; margin: 0; }
        header p { font-size: 0.9rem; color: #666; letter-spacing: 6px; margin-top: 35px; }

        .collections-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 80px 50px; 
            max-width: var(--content-max-width); 
            margin: 0 auto; 
            padding: 0 var(--content-padding) 120px; 
        }
        
        @media (max-width: 768px) {
            .collections-grid { grid-template-columns: 1fr; gap: 50px; padding: 0 25px 100px; }
            header h1 { font-size: 1.8rem; letter-spacing: 8px; }
            header p { font-size: 0.7rem; letter-spacing: 2px; }
            .view-section { padding-top: 100px; }
            .nav-links { gap: 15px; }
            .nav-links a small { display: none; }
            #device-toggle { display: none; }
            .footer-links { flex-direction: column; gap: 20px !important; }
        }

        .collection-card { cursor: pointer; width: 100%; }
        .img-wrap { aspect-ratio: 3/4; overflow: hidden; background: #111; margin-bottom: 20px; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s cubic-bezier(0.2, 0, 0.2, 1); filter: brightness(0.8); }
        .collection-card:hover img { transform: scale(1.05); filter: brightness(1); }
        .card-zh { font-size: 1rem; margin-bottom: 6px; letter-spacing: 1px; }
        .card-en { font-size: 0.75rem; color: #666; letter-spacing: 1px; text-transform: uppercase; }

        /* --- 页脚与联系方式 --- */
        .footer-contact { padding: 120px 20px; text-align: center; border-top: 1px solid rgba(128,128,128,0.1); }
        .footer-links { display: flex; justify-content: center; align-items: center; gap: 60px; }
        .footer-links a { 
            text-decoration: none; 
            color: #666; 
            font-size: 0.75rem; 
            letter-spacing: 1px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer-links a:hover { color: #fff; }
        body.light-mode .footer-links a:hover { color: #000; }

        /* 关于 & 详情 */
        .detail-wrapper { max-width: 900px; margin: 0 auto; padding: 0 var(--content-padding) 120px; }
        .about-section-h3 { font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 12px; margin-top: 60px; margin-bottom: 25px; color: #000; }
        .content-list-about { list-style: none; padding: 0; color: #555; font-size: 0.95rem; line-height: 2.2; }
    </style>
</head>
<body id="page-body">

    <div id="device-toggle" onclick="toggleDisplayMode()" title="切换模拟预览">
        <svg viewBox="0 0 24 24"><path id="icon-path" d="M17,19H7V5H17M17,1H7C5.89,1 5,1.89 5,3V21C5,22.11 5.89,23 7,23H17C18.11,23 19,22.11 19,21V3C19,1.89 18.11,1 17,1Z"/></svg>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.hash=''"><span></span><span></span><span></span></div>
            <ul class="nav-links">
                <li><a href="#"><span>首页</span><small>Index</small></a></li>
                <li><a href="#main-grid"><span>合集</span><small>Series</small></a></li>
                <li><a href="#about"><span>关于</span><small>About</small></a></li>
                <li><a href="#contact-anchor"><span>联系</span><small>Contact</small></a></li>
            </ul>
        </div>
    </nav>

    <div id="main-wrapper">
        <main id="landing-page" class="view-section active-view">
            <header>
                <h1>Vision Archive</h1>
                <p>以此存档 那些被日光稀释的瞬间</p>
            </header>
            <div class="collections-grid" id="main-grid"></div>
        </main>

        <main id="about-page" class="view-section">
            <div class="detail-wrapper" style="color:#000">
                <div style="padding: 20px 0;"><a onclick="window.location.hash=''" style="cursor:pointer; font-size:0.75rem; color:#888;">← BACK TO HOME</a></div>
                <h1 style="font-size: 2.8rem; margin: 20px 0;">关于 VISION ARCHIVE <span style="font-weight:200; font-size:1.5rem;">↗</span></h1>
                <p style="color: #888; font-family: monospace; font-size: 0.8rem; letter-spacing: 1px;">WebXR · Three.js · Photogrammetry</p>

                <h3 class="about-section-h3">核心贡献</h3>
                <ul class="content-list-about">
                    <li>— 构建了一个基于数字孪生的视觉交互系统。</li>
                    <li>— 将静态瞬间转换为可感知的数字空间。</li>
                    <li>— 重新建立了观察者对数字影像的真实信任感。</li>
                </ul>
            </div>
        </main>

        <main id="detail-page" class="view-section">
            <div class="detail-wrapper" style="color:#000">
                <div style="padding: 20px 0;"><a onclick="window.location.hash=''" style="cursor:pointer; font-size:0.75rem; color:#888;">← BACK TO PROJECTS</a></div>
                <h1 id="det-zh" style="font-size: 2.5rem; margin: 15px 0;">项目名称</h1>
                <div id="det-intro" style="margin: 60px auto; font-style: italic; line-height: 2.2; color: #444; text-align: center; font-size: 1.1rem;"></div>
                <div class="detail-gallery" id="det-images" style="display:flex; flex-direction:column; gap:60px;"></div>
            </div>
        </main>

        <footer class="footer-contact" id="contact-anchor">
            <div class="footer-links">
                <a href="#">@Vision Archive</a>
                <a href="mailto:contact@visionarchive.me">Email</a>
                <a href="https://xhslink.com/m/52WU1ywxBjw" target="_blank">Xiaohongshu ↗</a>
            </div>
        </footer>
    </div>

    <script>
        const collections = [
            { zh: "荒野之境", en: "Silence of Wild", cat: "Nature", loc: "Turkey", yr: "2023", intro: "探索自然界中被遗忘的寂静角落。", images: ["1.jpg", "2.jpg"] },
            { zh: "瞬时街头", en: "Pulse of Street", cat: "Street", loc: "Tokyo", yr: "2024", intro: "捕捉城市脉动中的瞬时美学。", images: ["4.jpg", "5.jpg"] },
            { zh: "几何重塑", en: "Geometry Forms", cat: "Architecture", loc: "Berlin", yr: "2024", intro: "建筑与光影的几何解构。", images: ["9.jpg", "10.jpg"] },
            { zh: "呼吸之间", en: "Breath of Life", cat: "Conceptual", loc: "Iceland", yr: "2022", intro: "记录生命最原始的律动。", images: ["6.jpg", "7.jpg"] }
        ];

        function handleRoute() {
            const hash = window.location.hash;
            const landing = document.getElementById('landing-page');
            const about = document.getElementById('about-page');
            const detail = document.getElementById('detail-page');

            if (hash === '#main-grid' || hash === '#contact-anchor') {
                landing.classList.add('active-view');
                document.body.classList.remove('light-mode');
                return; 
            }

            [landing, about, detail].forEach(el => el.classList.remove('active-view'));

            if (hash === '#about') {
                about.classList.add('active-view');
                document.body.classList.add('light-mode');
                window.scrollTo(0, 0);
            } else if (hash.startsWith('#project-')) {
                const idx = parseInt(hash.replace('#project-', ''));
                if (!isNaN(idx) && collections[idx]) {
                    renderDetail(idx);
                    detail.classList.add('active-view');
                    document.body.classList.add('light-mode');
                    window.scrollTo(0, 0);
                }
            } else {
                landing.classList.add('active-view');
                document.body.classList.remove('light-mode');
                window.scrollTo(0, 0);
            }
        }

        function renderDetail(idx) {
            const data = collections[idx];
            document.getElementById('det-zh').innerText = data.zh;
            document.getElementById('det-intro').innerText = `“ ${data.intro} ”`;
            const gallery = document.getElementById('det-images');
            gallery.innerHTML = '';
            data.images.forEach(imgName => {
                const img = document.createElement('img');
                img.src = `images/${imgName}`;
                img.style.width = "100%";
                img.style.height = "auto";
                img.onload = () => img.style.opacity = "1";
                gallery.appendChild(img);
            });
        }

        const grid = document.getElementById('main-grid');
        collections.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'collection-card';
            card.onclick = () => window.location.hash = `project-${index}`;
            card.innerHTML = `
                <div class="img-wrap"><img src="images/${item.images[0]}" loading="lazy"></div>
                <div class="card-zh">${item.zh}</div>
                <div class="card-en">${item.en}</div>
            `;
            grid.appendChild(card);
        });

        function toggleDisplayMode() {
            const wrapper = document.getElementById('main-wrapper');
            const isMobile = wrapper.classList.toggle('mode-mobile-active');
            document.getElementById('icon-path').setAttribute('d', isMobile ? 'M20,18H4V4H20M20,2H4A2,2 0 0,0 2,4V18A2,2 0 0,0 4,20H9L7,22H17L15,20H20A2,2 0 0,0 22,18V4C22,2.89 21.1,2 20,2Z' : 'M17,19H7V5H17M17,1H7C5.89,1 5,1.89 5,3V21C5,22.11 5.89,23 7,23H17C18.11,23 19,22.11 19,21V3C19,1.89 18.11,1 17,1Z');
        }

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);
    </script>
</body>
</html>
